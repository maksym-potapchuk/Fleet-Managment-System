<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34A396"/>
      <stop offset="100%" stop-color="#1E6B60"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <rect width="512" height="512" rx="115" fill="url(#glow)"/>

  <!-- "F" as a single unified path — no gaps -->
  <g transform="translate(256, 256)">
    <path d="
      M-90,-155
      L120,-155
      Q135,-155 135,-140
      L135,-110
      Q135,-95 120,-95
      L-25,-95
      L-25,-35
      L80,-35
      Q95,-35 95,-20
      L95,10
      Q95,25 80,25
      L-25,25
      L-25,145
      Q-25,155 -38,155
      L-78,155
      Q-90,155 -90,145
      Z
    " fill="white" opacity="0.95"/>

    <!-- Accent dot -->
    <circle cx="135" cy="-5" r="22" fill="white" opacity="0.5"/>

    <!-- Speed streaks -->
    <g opacity="0.3">
      <rect x="-165" y="-130" width="45" height="8" rx="4" fill="white"/>
      <rect x="-155" y="-55" width="35" height="8" rx="4" fill="white"/>
      <rect x="-165" y="20" width="45" height="8" rx="4" fill="white"/>
    </g>
  </g>
</svg>
