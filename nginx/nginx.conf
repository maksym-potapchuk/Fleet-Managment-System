upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name fdfleetmanager.site www.fdfleetmanager.site;

    # Let's Encrypt challenge (must stay on HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS (canonical domain)
    location / {
        return 301 https://fdfleetmanager.site$request_uri;
    }
}

# ── www HTTPS → bare domain redirect ─────────────────────────────────────────
# Requires cert issued with: -d fdfleetmanager.site -d www.fdfleetmanager.site
server {
    listen 443 ssl;
    http2 on;
    server_name www.fdfleetmanager.site;

    ssl_certificate     /etc/letsencrypt/live/fdfleetmanager.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fdfleetmanager.site/privkey.pem;

    return 301 https://fdfleetmanager.site$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name fdfleetmanager.site;

    # ── SSL certificates (Let's Encrypt) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/fdfleetmanager.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fdfleetmanager.site/privkey.pem;

    # ── SSL hardening ────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    client_max_body_size 20M;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://fdmanagerstorage.s3.amazonaws.com; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── SSE (notification stream) → Django ASGI ──────────────────────────────
    location /api/v1/notifications/stream/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # ── API & Admin → Django/Gunicorn ────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Media files — served directly by nginx ────────────────────────────────
    location /media/ {
        root /;
        try_files $uri @media_backend;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location @media_backend {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Django static (admin CSS/JS) ─────────────────────────────────────────
    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Next.js internal routes ──────────────────────────────────────────────
    location /_next/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── Everything else → Next.js ────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
